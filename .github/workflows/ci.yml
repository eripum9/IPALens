name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app
      - name: Resolve dependencies
        run: swift package resolve
      - name: Test
        run: swift test
      - name: Build Universal app
        run: chmod +x scripts/build-app.sh && scripts/build-app.sh
      - name: Verify architectures
        run: |
          app_archs="$(lipo -archs dist/IPALens.app/Contents/MacOS/IPALens)"
          service_archs="$(lipo -archs dist/IPALens.app/Contents/XPCServices/IPALensContainerService.xpc/Contents/MacOS/IPALensContainerService)"
          test "$app_archs" = "x86_64 arm64" || test "$app_archs" = "arm64 x86_64"
          test "$service_archs" = "x86_64 arm64" || test "$service_archs" = "arm64 x86_64"
      - name: Verify sandbox boundary
        run: |
          codesign --verify --deep --strict dist/IPALens.app
          codesign -d --entitlements :- dist/IPALens.app 2>/dev/null | grep -q '<key>com.apple.security.app-sandbox</key>'
          ! codesign -d --entitlements :- dist/IPALens.app/Contents/XPCServices/IPALensContainerService.xpc 2>/dev/null | grep -q '<key>com.apple.security.app-sandbox</key>'
      - name: Build architecture-specific installers
        run: chmod +x scripts/build-installers.sh && scripts/build-installers.sh
      - name: Verify installer payloads
        run: |
          pkgutil --payload-files dist/installers/IPALens-1.0.0-Apple-Silicon.pkg | grep -q '^\./IPALens.app/Contents/MacOS/IPALens$'
          pkgutil --payload-files dist/installers/IPALens-1.0.0-Intel.pkg | grep -q '^\./IPALens.app/Contents/MacOS/IPALens$'
      - uses: actions/upload-artifact@v4
        with:
          name: IPALens-development
          path: |
            dist/IPALens.app
            dist/installers/*.pkg
